events {}
http {
    map $http_x_forwarded_proto $forwarded_proto {
        default $http_x_forwarded_proto;
        "" $scheme;
    }
    client_max_body_size 20M;
    server {
        listen 80;
        server_name localhost;

        location /api/auth/v1/ {
            rewrite ^/api/auth/v1/(.*)$ /$1 break;
            proxy_pass http://auth:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
        }

        location /api/core/v1/ {
            rewrite ^/api/core/v1/(.*)$ /$1 break;
            proxy_pass http://core:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
        }

        location /api/events/v1/ {
            rewrite ^/api/events/v1/(.*)$ /$1 break;
            proxy_pass http://events:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
        }

        location /api/inventory/v1/ {
            rewrite ^/api/inventory/v1/(.*)$ /$1 break;
            proxy_pass http://inventory:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
        }

        location /api/sales-channel/v1/ {
            rewrite ^/api/sales-channel/v1/(.*)$ /$1 break;
            proxy_pass http://sales-channel:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
        }

        location / {
            # Static UI — no websocket upgrade needed (that is dev-only for Vite HMR)
            proxy_pass http://ui:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;

            # Intercept 404 from UI and retry with /index.html for SPA routing
            proxy_intercept_errors on;
            error_page 404 = @spa_fallback;
        }

        location @spa_fallback {
            rewrite ^ /index.html break;
            proxy_pass http://ui:80;
            proxy_set_header Host $host;
        }
    }
}
