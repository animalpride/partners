version: '3.8'

# ==============================================================================
# QA Environment Override
#
# Applies QA-specific network topology, Traefik labels, and volume names on
# top of deployment/base/docker-compose.yml.
#
# Deploy with:
#   docker stack deploy \
#     -c deployment/base/docker-compose.yml \
#     -c deployment/qa/docker-compose.override.yml \
#     --with-registry-auth denops
# ==============================================================================

services:

  nginx:
    deploy:
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.denops.rule=Host(`denops.octagon.home`)"
        - "traefik.http.routers.denops.entrypoints=websecure"
        - "traefik.http.routers.denops.tls=true"
        - "traefik.http.routers.denops.middlewares=sec"
        - "traefik.http.services.denops.loadbalancer.server.port=80"
        - "traefik.http.middlewares.sec.headers.framedeny=true"
        - "traefik.http.middlewares.sec.headers.stsseconds=63072000"
        - "traefik.http.middlewares.sec.headers.stsincludesubdomains=true"
        - "traefik.http.middlewares.sec.headers.stspreload=true"
        - "traefik.http.middlewares.sec.headers.contenttypenosniff=true"
        - "traefik.http.middlewares.sec.headers.browserxssfilter=true"
        - "denops.config.version=${CONFIG_VERSION_NGINX}"
    networks:
      - traefik_network
      - backend

  auth:
    networks:
      - backend

  core:
    networks:
      - backend

  events:
    # traefik_network is required: the shared RabbitMQ instance in QA lives on
    # this network. Do not remove without first migrating RabbitMQ topology.
    networks:
      - backend
      - traefik_network

  assets:
    volumes:
      - denops-assets:/asset_source
    networks:
      - backend

  inventory:
    networks:
      - backend

  sales-channel:
    networks:
      - backend

  ui:
    networks:
      - backend

networks:
  traefik_network:
    external: true
  backend:
    driver: overlay
    attachable: true  # Allows external containers to connect for testing

volumes:
  denops-assets:
    external: true
