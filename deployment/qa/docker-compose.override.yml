version: '3.8'

# ==============================================================================
# QA Environment Override
#
# Applies QA-specific network topology, Traefik labels, and volume names on
# top of deployment/base/docker-compose.yml.
#
# Deploy with:
#   docker stack deploy \
#     -c deployment/base/docker-compose.yml \
#     -c deployment/qa/docker-compose.override.yml \
#     --with-registry-auth denops
# ==============================================================================

services:

  nginx:
    deploy:
      replicas: 1
      resources:
        reservations:
          cpus: '0.05'
          memory: 64M
        limits:
          cpus: '0.10'
          memory: 96M
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.partners.rule=Host(`partners.octagon.home`)"
        - "traefik.http.routers.partners.entrypoints=websecure"
        - "traefik.http.routers.partners.tls=true"
        - "traefik.http.routers.partners.middlewares=sec"
        - "traefik.http.services.partners.loadbalancer.server.port=80"
        - "traefik.http.middlewares.sec.headers.framedeny=true"
        - "traefik.http.middlewares.sec.headers.stsseconds=63072000"
        - "traefik.http.middlewares.sec.headers.stsincludesubdomains=true"
        - "traefik.http.middlewares.sec.headers.stspreload=true"
        - "traefik.http.middlewares.sec.headers.contenttypenosniff=true"
        - "traefik.http.middlewares.sec.headers.browserxssfilter=true"
        - "partners.config.version=${CONFIG_VERSION_NGINX}"
    networks:
      - traefik_network
      - backend

  auth:
    deploy:
      replicas: 1
      resources:
        reservations:
          cpus: '0.10'
          memory: 128M
        limits:
          cpus: '0.30'
          memory: 256M
    networks:
      - backend

  core:
    deploy:
      replicas: 1
      resources:
        reservations:
          cpus: '0.15'
          memory: 160M
        limits:
          cpus: '0.35'
          memory: 320M
    networks:
      - backend

  ui:
    deploy:
      replicas: 1
      resources:
        reservations:
          cpus: '0.10'
          memory: 96M
        limits:
          cpus: '0.15'
          memory: 160M
    networks:
      - backend

networks:
  traefik_network:
    external: true
  backend:
    driver: overlay
    attachable: true  # Allows external containers to connect for testing

volumes:
  partners-assets:
    external: true
