server:
  port: 8080
  host: 0.0.0.0
jwt_secret: your-secret-key-here
port: 8080
env: "development"

site:
  coming_soon:
    enabled: true
    message: "The partners.animalpride.com experience is being redesigned to better serve you. We look forward to sharing the new site shortly. Check back soon!"
    preview_path: "preview-qa-rotate-me"
    preview_cookie_name: "ap_preview_access"
    preview_cookie_ttl_hours: 72
    preview_cookie_secure: true

auth_session:
  access_token_ttl: "15m"
  refresh_token_ttl: "720h"
  refresh_rotation_interval: "24h"

auth:
  base_url: "http://auth:8080/"
internal_auth:
  token: "replace-with-internal-token"
core:
  base_url: "http://core:8080"

database:
  host: 192.168.1.190
  port: 3306
  user: jauchter
  password: replace-with-db-password
  authdbname: partners_qa_auth
  coredbname: partners_qa_core

email:
  smtp_host: "smtp-relay.gmail.com"
  smtp_port: 587
  smtp_tls: true
  smtp_auth: false
  from_email: "noreply@animalpride.com"
  from_name: "DenOps"
  partner_leads_to: "partners@animalpride.com"
  links:
    invite_base_url: "https://partners.octagon.home/accept-invitation"
    reset_base_url: "https://partners.octagon.home/reset-password"
  smtp_user: "your-email@gmail.com"
  smtp_password: "your-app-password"
