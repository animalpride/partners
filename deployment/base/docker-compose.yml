version: '3.8'

# ==============================================================================
# Base Compose File — Shared between QA and Production
#
# This file contains all service definitions, deploy configs, healthchecks,
# secrets, and top-level config/secret declarations that are identical across
# environments. It is never deployed on its own.
#
# Deploy with:
#   docker stack deploy \
#     -c deployment/base/docker-compose.yml \
#     -c deployment/<env>/docker-compose.override.yml \
#     --with-registry-auth denops
#
# Environment-specific overrides (networks, Traefik labels, volume names)
# live in deployment/qa/docker-compose.override.yml and
# deployment/prod/docker-compose.override.yml.
# ==============================================================================

services:

  # API Gateway - Single entry point
  nginx:
    image: nginx:alpine
    configs:
      - source: denops-nginx
        target: /etc/nginx/nginx.conf
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
      restart_policy:
        condition: on-failure

  auth:
    image: registry.octagon.home/animal-pride/denops-auth:${IMAGE_TAG}
    configs:
      - source: denops-config
        target: /opt/denops-auth/config.yml
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    secrets:
      - denops_auth_db_password
      - denops_auth_jwt_secret
    environment:
      - GIN_MODE=release
      - DENOPS_AUTH_DB_PASSWORD_FILE=/run/secrets/denops_auth_db_password
      - DENOPS_AUTH_JWT_SECRET_FILE=/run/secrets/denops_auth_jwt_secret
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      labels:
        - "denops.config.version=${CONFIG_VERSION_APP}"

  core:
    image: registry.octagon.home/animal-pride/denops-core:${IMAGE_TAG}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    configs:
      - source: denops-config
        target: /opt/denops-core/config.yml
    environment:
      - GIN_MODE=release
      - DENOPS_CORE_DB_PASSWORD_FILE=/run/secrets/denops_core_db_password
      - DENOPS_INTERNAL_TOKEN_FILE=/run/secrets/denops_internal_token
    secrets:
      - denops_core_db_password
      - denops_internal_token
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
      restart_policy:
        condition: on-failure
      labels:
        - "denops.config.version=${CONFIG_VERSION_APP}"

  events:
    image: registry.octagon.home/animal-pride/denops-events:${IMAGE_TAG}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    configs:
      - source: denops-config
        target: /opt/denops-events/config.yml
    environment:
      - GIN_MODE=release
      - DENOPS_EVENTS_DB_USER_FILE=/run/secrets/denops_events_db_user
      - DENOPS_EVENTS_DB_PASSWORD_FILE=/run/secrets/denops_events_db_password
      - DENOPS_INTERNAL_TOKEN_FILE=/run/secrets/denops_internal_token
      - DENOPS_EVENTS_RABBITMQ_USER_FILE=/run/secrets/denops_events_rabbitmq_user
      - DENOPS_EVENTS_RABBITMQ_PASSWORD_FILE=/run/secrets/denops_events_rabbitmq_password
    secrets:
      - denops_events_db_user
      - denops_events_db_password
      - denops_internal_token
      - denops_events_rabbitmq_user
      - denops_events_rabbitmq_password
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
      restart_policy:
        condition: on-failure
      labels:
        - "denops.config.version=${CONFIG_VERSION_APP}"

  assets:
    image: registry.octagon.home/animal-pride/assets:${IMAGE_TAG}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    configs:
      - source: denops-config
        target: /opt/assets/config.yml
    environment:
      - GIN_MODE=release
      - DENOPS_ASSETS_DB_PASSWORD_FILE=/run/secrets/denops_assets_db_password
    secrets:
      - denops_assets_db_password
    deploy:
      replicas: 6
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
      restart_policy:
        condition: on-failure
      labels:
        - "denops.config.version=${CONFIG_VERSION_APP}"

  inventory:
    image: registry.octagon.home/animal-pride/inventory:${IMAGE_TAG}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    configs:
      - source: denops-config
        target: /opt/inventory/config.yml
    environment:
      - GIN_MODE=release
      - DENOPS_INVENTORY_DB_PASSWORD_FILE=/run/secrets/denops_inventory_db_password
      - DENOPS_INTERNAL_TOKEN_FILE=/run/secrets/denops_internal_token
    secrets:
      - denops_inventory_db_password
      - denops_internal_token
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
      restart_policy:
        condition: on-failure
      labels:
        - "denops.config.version=${CONFIG_VERSION_APP}"

  sales-channel:
    image: registry.octagon.home/animal-pride/sales-channel:${IMAGE_TAG}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    configs:
      - source: denops-config
        target: /opt/sales-channel/config.yml
    environment:
      - GIN_MODE=release
      - DENOPS_SALES_CHANNEL_DB_PASSWORD_FILE=/run/secrets/denops_sales_channel_db_password
      - DENOPS_INTERNAL_TOKEN_FILE=/run/secrets/denops_internal_token
      - DENOPS_SC_SHOPIFY_DENOPS_INTEGRATION_CLIENT_ID_FILE=/run/secrets/denops_sc_shopify_denops_client_id
      - DENOPS_SC_SHOPIFY_DENOPS_INTEGRATION_CLIENT_SECRET_FILE=/run/secrets/denops_sc_shopify_denops_client_secret
    secrets:
      - denops_sales_channel_db_password
      - denops_internal_token
      - denops_sc_shopify_denops_client_id
      - denops_sc_shopify_denops_client_secret

    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
      restart_policy:
        condition: on-failure
      labels:
        - "denops.config.version=${CONFIG_VERSION_APP}"

  ui:
    image: registry.octagon.home/animal-pride/denops-ui:${IMAGE_TAG}
    healthcheck:
      test: ["CMD-SHELL", "curl -v -f http://localhost/ || (echo 'Healthcheck failed' && exit 1)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
      restart_policy:
        condition: on-failure
      labels:
        - "denops.config.version=${CONFIG_VERSION_APP}"

configs:
  denops-config:
    name: denops-config-${CONFIG_VERSION_APP}
    external: true
  denops-nginx:
    name: denops-nginx-${CONFIG_VERSION_NGINX}
    external: true

secrets:
  denops_auth_db_password:
    external: true
  denops_auth_jwt_secret:
    external: true
  denops_assets_db_password:
    external: true
  denops_core_db_password:
    external: true
  denops_internal_token:
    external: true
  denops_events_db_user:
    external: true
  denops_events_db_password:
    external: true
  denops_events_rabbitmq_user:
    external: true
  denops_events_rabbitmq_password:
    external: true
  denops_inventory_db_password:
    external: true
  denops_sales_channel_db_password:
    external: true
  denops_sc_shopify_denops_client_id:
    external: true
  denops_sc_shopify_denops_client_secret:
    external: true

