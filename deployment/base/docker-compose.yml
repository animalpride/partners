version: '3.8'

# ==============================================================================
# Base Compose File — Shared between QA and Production
#
# This file contains all service definitions, deploy configs, healthchecks,
# secrets, and top-level config/secret declarations that are identical across
# environments. It is never deployed on its own.
#
# Deploy with:
#   docker stack deploy \
#     -c deployment/base/docker-compose.yml \
#     -c deployment/<env>/docker-compose.override.yml \
#     --with-registry-auth partners
#
# Environment-specific overrides (networks, Traefik labels, volume names)
# live in deployment/qa/docker-compose.override.yml and
# deployment/prod/docker-compose.override.yml.
# ==============================================================================

services:

  # API Gateway - Single entry point
  nginx:
    image: nginx:alpine
    configs:
      - source: partners-nginx
        target: /etc/nginx/nginx.conf
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
      restart_policy:
        condition: on-failure

  auth:
    image: registry.octagon.home/animal-pride/partners-auth:${IMAGE_TAG}
    configs:
      - source: partners-config
        target: /opt/auth/config.yml
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    secrets:
      - partners_auth_db_password
      - partners_auth_jwt_secret
    environment:
      - GIN_MODE=release
      - PARTNERS_AUTH_DB_PASSWORD_FILE=/run/secrets/partners_auth_db_password
      - PARTNERS_AUTH_JWT_SECRET_FILE=/run/secrets/partners_auth_jwt_secret
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      labels:
        - "partners.config.version=${CONFIG_VERSION_APP}"

  core:
    image: registry.octagon.home/animal-pride/partners-core:${IMAGE_TAG}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    configs:
      - source: partners-config
        target: /opt/core/config.yml
    environment:
      - GIN_MODE=release
      - PARTNERS_CORE_DB_PASSWORD_FILE=/run/secrets/partners_core_db_password
      - PARTNERS_INTERNAL_TOKEN_FILE=/run/secrets/partners_internal_token
    secrets:
      - partners_core_db_password
      - partners_internal_token
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
      restart_policy:
        condition: on-failure
      labels:
        - "partners.config.version=${CONFIG_VERSION_APP}"

  ui:
    image: registry.octagon.home/animal-pride/partners-ui:${IMAGE_TAG}
    healthcheck:
      test: ["CMD-SHELL", "curl -v -f http://localhost/ || (echo 'Healthcheck failed' && exit 1)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
      restart_policy:
        condition: on-failure
      labels:
        - "partners.config.version=${CONFIG_VERSION_APP}"

configs:
  partners-config:
    name: partners-config-${CONFIG_VERSION_APP}
    external: true
  partners-nginx:
    name: partners-nginx-${CONFIG_VERSION_NGINX}
    external: true

secrets:
  partners_auth_db_password:
    external: true
  partners_auth_jwt_secret:
    external: true
  partners_assets_db_password:
    external: true
  partners_core_db_password:
    external: true
  partners_internal_token:
    external: true
 
