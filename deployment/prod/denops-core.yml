server:
  port: 8080
  host: 0.0.0.0
jwt_secret: replaced-by-production-secret-key
port: 8080
env: "production"

auth_session:
  access_token_ttl: "15m"
  refresh_token_ttl: "720h"
  refresh_rotation_interval: "24h"

auth:
  base_url: "http://auth:8080/"
internal_auth:
  token: "replace-with-internal-token"
events:
  base_url: "http://events:8080"
inventory:
  base_url: "http://inventory:8080"
sku:
  product_definition_prefix: "DPD"
sales_channel:
  base_url: "http://sales-channel:8080"
core:
  base_url: "http://core:8080"
internal_image_service:
  base_url: "http://assets:8080/"
  create_endpoint: "assets/"
  get_endpoint: "assets/:asset_id"

database:
  host: denops-db
  port: 3306
  user: denops
  password: replace-with-db-password
  authdbname: auth
  coredbname: core
  eventsdbname: events
  assetdbname: assets
  inventorydbname: inventory
  saleschanneldbname: sales_channel
  pool:
    max_open_conns: 10
    max_idle_conns: 5
    conn_max_lifetime_minutes: 30
    conn_max_idle_minutes: 5

rabbitmq:
  host: "rabbitmq"
  port: 5672
  user: replace-with-rabbitmq-user
  pass: replace-with-rabbitmq-password
  vhost: "/"

event_management:
  server:
    port: 8080
  scheduler:
    polling_interval: "10s"
  logging:
    max_size_mb: 10
    max_backups: 3
    max_age_days: 28
    compress: true

assets:
  base_path: "/asset_source" # update with actual path if needed

email:
  smtp_host: "smtp-relay.gmail.com"
  smtp_port: 587
  smtp_tls: true
  smtp_auth: false
  from_email: "noreply@animalpride.com"
  from_name: "DenOps"
  partner_leads_to: "partners@animalpride.com"
  links:
    invite_base_url: "https://denops.animalpride.com/accept-invitation"
    reset_base_url: "https://denops.animalpride.com/reset-password"
  smtp_user: "your-email@gmail.com"
  smtp_password: "your-app-password"

# ---------------------------------------------------------------------------
# channel_apps (sales-channel service only)
# Credential values here are placeholders — resolved at runtime from Docker
# secrets using the DENOPS_SC_<TYPE>_<APP>_<KEY>_FILE env vars.
# ---------------------------------------------------------------------------
channel_apps:
  shopify:
    - app: "denops_integration"
      credentials:
        shop_url: "animalpride-com.myshopify.com"
        client_id: "replace-via-secret"
        client_secret: "replace-via-secret"
  # etsy:
  #   - app: "custom_app"
  #     credentials:
  #       api_key: "replace-via-secret"
  #       api_secret: "replace-via-secret"
